name: .NET Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
   
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1
   
    - name: Restore NuGet packages
      run: nuget restore CyberChatBotGUI.csproj
   
    - name: Build with MSBuild
      run: msbuild CyberChatBotGUI.csproj /p:Configuration=Release /p:Platform="Any CPU"
